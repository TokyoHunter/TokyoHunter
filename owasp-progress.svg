<svg viewBox="0 0 800 130" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New',monospace">
<defs>
  <style>
    @keyframes fillBar { from{width:0} to{width:193px} }
    @keyframes glow { 0%,100%{opacity:0.5} 50%{opacity:1} }
    @keyframes dash { to{stroke-dashoffset:-16} }
    @keyframes fadein { from{opacity:0} to{opacity:1} }
    .bar  { animation:fillBar 2.4s 0.3s cubic-bezier(.4,0,.2,1) both }
    .pulse{ animation:glow 1.8s ease-in-out infinite }
    .dash { stroke-dasharray:4 4; animation:dash 0.8s linear infinite }
    .fi   { animation:fadein 0.6s 2.6s both }
  </style>
</defs>

<rect width="800" height="130" fill="#080d13"/>
<line x1="20" y1="16" x2="780" y2="16" stroke="#00e5ff" stroke-width="0.6" opacity="0.3" class="dash"/>
<line x1="20" y1="118" x2="780" y2="118" stroke="#00e5ff" stroke-width="0.6" opacity="0.3" class="dash"/>

<!-- left block -->
<text x="30" y="46" font-size="9" fill="#00e5ff" letter-spacing="3" opacity="0.8">OWASP 1000H CHALLENGE</text>
<text x="30" y="80" font-size="42" font-weight="900" fill="#ffffff">250</text>
<text x="108" y="80" font-size="15" fill="#2a5a72">/ 1000 hrs</text>
<text x="30" y="100" font-size="9" fill="#00ff88" letter-spacing="2">25% — 750 hrs remaining</text>
<text x="30" y="114" font-size="8" fill="#1a3a50" letter-spacing="1">target: 4 months to complete</text>

<!-- track -->
<rect x="230" y="44" width="548" height="36" rx="4" fill="#0a1824"/>
<rect x="230" y="44" width="548" height="36" rx="4" fill="none" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.35"/>

<!-- segment ticks -->
<line x1="367" y1="44" x2="367" y2="80" stroke="#0d2535" stroke-width="1.5"/>
<line x1="504" y1="44" x2="504" y2="80" stroke="#0d2535" stroke-width="1.5"/>
<line x1="641" y1="44" x2="641" y2="80" stroke="#0d2535" stroke-width="1.5"/>

<!-- segment labels inside track -->
<text x="298" y="67" text-anchor="middle" font-size="10" fill="#0f2d42">250h</text>
<text x="435" y="67" text-anchor="middle" font-size="10" fill="#0f2d42">500h</text>
<text x="572" y="67" text-anchor="middle" font-size="10" fill="#0f2d42">750h</text>
<text x="709" y="67" text-anchor="middle" font-size="10" fill="#0f2d42">1000h</text>

<!-- fill -->
<clipPath id="cp"><rect x="230" y="44" width="548" height="36" rx="4"/></clipPath>
<g clip-path="url(#cp)">
  <rect x="230" y="44" height="36" fill="#005580" class="bar"/>
  <rect x="230" y="44" height="36" fill="#00e5ff" fill-opacity="0.12" class="bar"/>
  <!-- shimmer stripe -->
  <rect x="230" y="44" width="40" height="36" fill="url(#sh)" class="bar"/>
</g>
<defs>
  <linearGradient id="sh" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
    <stop offset="60%" stop-color="#00e5ff" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </linearGradient>
</defs>

<!-- glow leading edge -->
<rect x="420" y="42" width="4" height="40" rx="2" fill="#00e5ff" class="pulse bar" style="animation:fillBar 2.4s 0.3s cubic-bezier(.4,0,.2,1) both,glow 1.8s 2.7s ease-in-out infinite"/>

<!-- current label -->
<g class="fi">
  <text x="423" y="97" font-size="9" fill="#00e5ff" text-anchor="middle">▲ now</text>
</g>
</svg>
