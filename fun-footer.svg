<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New',monospace">
<defs>
  <style>
    @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes type   { from{width:0} to{width:260px} }
    @keyframes dash   { to{stroke-dashoffset:-16} }
    @keyframes eyemov { 0%,40%,100%{transform:translateX(0)} 45%,55%{transform:translateX(3px)} 60%,95%{transform:translateX(0)} 97%{transform:translateX(-2px)} }
    @keyframes scan2  { 0%{transform:translateY(0)} 100%{transform:translateY(80px)} }
    .cursor { animation:blink 1s step-end infinite }
    .hacker { animation:float 3s ease-in-out infinite }
    .eye    { animation:eyemov 4s ease-in-out infinite }
    .dash   { stroke-dasharray:4 4; animation:dash 0.8s linear infinite }
    .scan   { animation:scan2 2.5s linear infinite }
    .typetext { font-size:11px; fill:#00e5ff; font-family:'Courier New',monospace; letter-spacing:1px }
  </style>
</defs>

<rect width="800" height="160" fill="#080d13"/>
<line x1="20" y1="14" x2="780" y2="14" stroke="#00e5ff" stroke-width="0.5" opacity="0.25" class="dash"/>
<line x1="20" y1="150" x2="780" y2="150" stroke="#00e5ff" stroke-width="0.5" opacity="0.25" class="dash"/>

<!-- terminal window left -->
<rect x="30" y="26" width="340" height="118" rx="5" fill="#0a1520" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.4"/>
<!-- terminal title bar -->
<rect x="30" y="26" width="340" height="20" rx="5" fill="#0d1f30"/>
<rect x="30" y="38" width="340" height="8" fill="#0d1f30"/>
<circle cx="46" cy="36" r="4" fill="#ff5f57"/>
<circle cx="60" cy="36" r="4" fill="#febc2e"/>
<circle cx="74" cy="36" r="4" fill="#28c840"/>
<text x="170" y="39" text-anchor="middle" font-size="8" fill="#2a5a72" letter-spacing="2">terminal — bash</text>

<!-- terminal content -->
<text x="44" y="66" font-size="10" fill="#2a6a44">root@github</text>
<text x="112" y="66" font-size="10" fill="#00e5ff">:~#</text>
<text x="136" y="66" font-size="10" fill="#8ab8cc"> whoami</text>

<text x="44" y="82" font-size="10" fill="#8ab8cc">TokyoHunter</text>

<text x="44" y="98" font-size="10" fill="#2a6a44">root@github</text>
<text x="112" y="98" font-size="10" fill="#00e5ff">:~#</text>
<text x="136" y="98" font-size="10" fill="#8ab8cc"> ./hack_the_planet.sh</text>

<text x="44" y="114" font-size="10" fill="#00ff88">[+] target acquired</text>
<text x="44" y="128" font-size="10" fill="#00ff88">[+] shell obtained</text>

<text x="44" y="140" font-size="10" fill="#2a6a44">root@github</text>
<text x="112" y="140" font-size="10" fill="#00e5ff">:~#</text>
<rect x="136" y="131" width="7" height="12" fill="#00e5ff" class="cursor"/>

<!-- scan line inside terminal -->
<clipPath id="termclip"><rect x="30" y="46" width="340" height="98" rx="0"/></clipPath>
<rect x="30" y="46" width="340" height="14" fill="#00e5ff" fill-opacity="0.03" class="scan" clip-path="url(#termclip)"/>

<!-- hacker figure right -->
<g class="hacker" transform="translate(490,30)">
  <!-- monitor -->
  <rect x="40" y="30" width="100" height="68" rx="4" fill="#0d1f30" stroke="#00e5ff" stroke-width="1.5"/>
  <!-- screen glow -->
  <rect x="46" y="36" width="88" height="56" rx="2" fill="#001a2e"/>
  <!-- screen text lines -->
  <rect x="52" y="42" width="50" height="3" rx="1" fill="#00e5ff" opacity="0.7"/>
  <rect x="52" y="50" width="70" height="3" rx="1" fill="#00ff88" opacity="0.5"/>
  <rect x="52" y="58" width="40" height="3" rx="1" fill="#00e5ff" opacity="0.4"/>
  <rect x="52" y="66" width="60" height="3" rx="1" fill="#00ff88" opacity="0.6"/>
  <rect x="52" y="74" width="30" height="3" rx="1" fill="#00e5ff" opacity="0.3"/>
  <!-- cursor blink on screen -->
  <rect x="52" y="82" width="6" height="5" fill="#00e5ff" class="cursor"/>
  <!-- monitor stand -->
  <rect x="82" y="98" width="16" height="10" rx="1" fill="#0d1f30" stroke="#00e5ff" stroke-width="1"/>
  <rect x="68" y="108" width="44" height="5" rx="2" fill="#0d1f30" stroke="#00e5ff" stroke-width="1"/>

  <!-- hacker body -->
  <!-- head -->
  <circle cx="90" cy="15" r="13" fill="#1a3a50" stroke="#00e5ff" stroke-width="1"/>
  <!-- hoodie -->
  <path d="M68,118 Q72,128 90,130 Q108,128 112,118 L108,118 Q104,126 90,127 Q76,126 72,118 Z" fill="#0d1f30" stroke="#00e5ff" stroke-width="0.8"/>
  <!-- eyes -->
  <g class="eye">
    <circle cx="84" cy="14" r="3" fill="#00e5ff"/>
    <circle cx="96" cy="14" r="3" fill="#00e5ff"/>
    <circle cx="85" cy="14" r="1.2" fill="#001a2e"/>
    <circle cx="97" cy="14" r="1.2" fill="#001a2e"/>
  </g>
  <!-- hoodie outline on head -->
  <path d="M77,22 Q78,28 90,29 Q102,28 103,22" fill="none" stroke="#00e5ff" stroke-width="0.8"/>

  <!-- arms -->
  <line x1="74" y1="118" x2="56" y2="108" stroke="#0d1f30" stroke-width="8" stroke-linecap="round"/>
  <line x1="56" y1="108" x2="42" y2="115" stroke="#0d1f30" stroke-width="6" stroke-linecap="round"/>
  <line x1="106" y1="118" x2="124" y2="108" stroke="#0d1f30" stroke-width="8" stroke-linecap="round"/>
  <line x1="124" y1="108" x2="138" y2="115" stroke="#0d1f30" stroke-width="6" stroke-linecap="round"/>

  <!-- hands on keyboard -->
  <rect x="32" y="113" width="14" height="8" rx="3" fill="#1a3a50" stroke="#00e5ff" stroke-width="0.8"/>
  <rect x="134" y="113" width="14" height="8" rx="3" fill="#1a3a50" stroke="#00e5ff" stroke-width="0.8"/>

  <!-- keyboard -->
  <rect x="28" y="120" width="124" height="18" rx="3" fill="#0d1f30" stroke="#00e5ff" stroke-width="1"/>
  <rect x="34" y="124" width="8" height="5" rx="1" fill="#0a1520" stroke="#00e5ff" stroke-width="0.5"/>
  <rect x="46" y="124" width="8" height="5" rx="1" fill="#0a1520" stroke="#00e5ff" stroke-width="0.5"/>
  <rect x="58" y="124" width="8" height="5" rx="1" fill="#0a1520" stroke="#00e5ff" stroke-width="0.5"/>
  <rect x="70" y="124" width="28" height="5" rx="1" fill="#00e5ff" fill-opacity="0.2" stroke="#00e5ff" stroke-width="0.5"/>
  <rect x="102" y="124" width="8" height="5" rx="1" fill="#0a1520" stroke="#00e5ff" stroke-width="0.5"/>
  <rect x="114" y="124" width="8" height="5" rx="1" fill="#0a1520" stroke="#00e5ff" stroke-width="0.5"/>
  <rect x="126" y="124" width="14" height="5" rx="1" fill="#0a1520" stroke="#00e5ff" stroke-width="0.5"/>
</g>

<!-- caption -->
<text x="572" y="152" text-anchor="middle" font-size="9" fill="#1a3a50" letter-spacing="2">// see you in the next commit</text>
</svg>
